# =============================================================================
# C++ OPTIMIZED LiDAR AUGMENTATION CONFIGURATION
# Scientifically grounded parameter choices for phenomenological LiDAR
# degradation simulation and SLAM robustness evaluation.
# =============================================================================
#
# Core references used for repository-level rationale:
# - Weitkamp (2005): atmospheric attenuation and LiDAR signal transmission
# - Heinzler et al. (2019): automotive LiDAR behavior in fog and rain
# - Bijelic et al. (2020): adverse-weather LiDAR perception degradation
# - Rasshofer et al. (2011): automotive laser radar under weather effects
# - Hasirlioglu et al. (2016): rain influence on automotive surround sensors
# - Glennie & Lichti (2011): LiDAR range stability / precision analysis
# - Ouster OS1 datasheet (2023): nominal sensor specifications
#
# Important note:
# These parameters are phenomenological approximations chosen for controlled
# robustness benchmarking. They are informed by the above literature and
# sensor specifications, but they are not intended as exact reproductions of
# any single physical weather condition or hardware operating mode.
# =============================================================================

# =============================================================================
# Note: Topics, sensor types, and frame IDs are auto-detected from rosbags.
# Only augmentation parameters and IMU settings need to be configured.
# =============================================================================

# IMU Configuration (Optional - for motion distortion)
imu:
  enabled: true                 # Enable IMU-assisted motion distortion when IMU is available
  synchronization:
    time_tolerance: 0.1         # Max time difference for LiDAR-IMU sync (seconds)
    max_queue_size: 50          # Maximum synchronized message queue size

# =============================================================================
# SCENARIOS - SCIENTIFICALLY MOTIVATED PARAMETER VALUES
# =============================================================================

scenarios:

  # ========== LIGHT SCENARIO ==========
  # Simulates: clear-weather / controlled-operation conditions
  # Scientific basis: near-nominal sensing behavior with minimal degradation
  # Inspired by: manufacturer specifications and clean benchmarking conditions

  light:
    dropout:
      enabled: false            # No atmospheric attenuation or contamination-induced loss

    fov_reduction:
      enabled: false            # No occlusion or aperture contamination

    noise:
      enabled: true
      gaussian_std: 0.008       # 8 mm (1σ) Gaussian range noise
                                # Consistent with nominal LiDAR precision levels reported
                                # in sensor specifications (e.g., Ouster OS1 datasheet)
                                # and empirical LiDAR stability studies
                                # (Glennie & Lichti, 2011)

      outlier_rate: 0.003       # 0.3% low-rate spurious returns
                                # Represents occasional multipath / reflectivity artifacts
                                # in otherwise clean environments

      outlier_std: 0.15         # 15 cm outlier deviation
                                # Small displacement consistent with weak ghost returns

    occlusion:
      enabled: false            # No explicit occlusion zones in clear scenes

    motion_distortion:
      enabled: false            # Static or low-speed motion without meaningful scan warping

    sparse_scan:
      enabled: false            # Full point density preserved


  # ========== MODERATE SCENARIO ==========
  # Simulates: realistic outdoor operation with mild fog/haze, spray, or
  # partial contamination
  # Scientific basis: moderate sensing degradation observed in automotive
  # adverse-weather studies and corruption-style robustness benchmarks

  moderate:
    dropout:
      enabled: true
      rate: 0.15               # 15% dropout
                               # Phenomenological approximation of signal attenuation under
                               # mild fog / haze or partial obscuration, consistent with
                               # Beer-Lambert-style attenuation reasoning (Weitkamp, 2005)
                               # and adverse-weather LiDAR studies
                               # (Heinzler et al., 2019; Bijelic et al., 2020)

    fov_reduction:
      enabled: true
      horizontal: 0.08         # 8% horizontal FoV loss
                               # Represents partial aperture contamination or side occlusion
                               # effects observed in automotive sensing environments
                               # (Rasshofer et al., 2011)

      vertical: 0.12           # 12% vertical FoV loss
                               # Represents lower-angle visibility loss due to road spray,
                               # splash, or nearby obstruction

    noise:
      enabled: true
      gaussian_std: 0.02       # 2 cm Gaussian range noise
                               # Chosen to reflect increased uncertainty under degraded
                               # sensing conditions, while remaining consistent with
                               # empirical LiDAR precision / stability studies
                               # (Glennie & Lichti, 2011)

      outlier_rate: 0.01       # 1% spurious-return rate
                               # Phenomenological value representing increased ghost /
                               # clutter returns under mild adverse-weather or reflective
                               # disturbance conditions (Hasirlioglu et al., 2016;
                               # Heinzler et al., 2019)

      outlier_std: 0.4         # 40 cm outlier deviation
                               # Models moderate multipath / scattering-induced displacement

    occlusion:
      enabled: false           # Explicit occlusion activated only for stronger scenarios

    motion_distortion:
      enabled: false           # Assumes moderate motion without strong scan warping

    sparse_scan:
      enabled: false           # Full scan density preserved at moderate severity


  # ========== HEAVY SCENARIO ==========
  # Simulates: heavy rain, dense fog, snow, or strong road spray
  # Scientific basis: severe environmental degradation used for stress testing
  # Supported conceptually by weather-affected automotive LiDAR studies

  heavy:
    dropout:
      enabled: true
      rate: 0.30              # 30% dropout
                              # Represents strong attenuation / return loss under dense
                              # scattering conditions, consistent with LiDAR transmission
                              # reasoning (Weitkamp, 2005) and harsh-weather perception
                              # studies (Bijelic et al., 2020; Heinzler et al., 2019)

      mode: "random"          # Random loss approximates spatially varying scattering /
                              # absorption effects

    fov_reduction:
      enabled: true
      horizontal: 0.15        # 15% horizontal FoV loss
                              # Represents stronger aperture contamination or side blockage
                              # than in the moderate scenario

      vertical: 0.25          # 25% vertical FoV loss
                              # Models more severe lower-angle masking from spray, splash,
                              # snow accumulation, or nearby obstruction

    noise:
      enabled: true
      gaussian_std: 0.045     # 4.5 cm Gaussian range noise
                              # Represents elevated measurement uncertainty under strongly
                              # degraded sensing conditions; consistent with increasing
                              # range instability relative to nominal operation

      outlier_rate: 0.025     # 2.5% spurious-return rate
                              # Models increased clutter / ghost detections caused by
                              # precipitation particles and reflective disturbance
                              # in adverse-weather sensing studies
                              # (Hasirlioglu et al., 2016; Bijelic et al., 2020)

      outlier_std: 0.8        # 80 cm outlier deviation
                              # Larger displacement for heavy multipath / scattering effects

    occlusion:
      enabled: true
      distance_threshold: 40.0  # 40 m effective visibility threshold
                                # Represents reduced usable sensing range under heavy
                                # environmental degradation

      num_objects: 4
      object_size: 2.5          # 2.5 m occlusion blobs
                                # Approximates contiguous local masking from dense spray,
                                # vegetation, pedestrians, or vehicles

    motion_distortion:
      enabled: false            # Heavy environment without explicit scan-warp motion model

    sparse_scan:
      enabled: true
      skip_factor: 2            # Retain every 2nd scan element
                                # Models reduced effective sampling density and structured
                                # under-sampling used for robustness stress testing


  # ========== EXTREME SCENARIO ==========
  # Simulates: worst-case sensing conditions
  # Scientific basis: near-failure stress scenario for robustness evaluation,
  # not an exact one-to-one physical weather replica

  extreme:
    dropout:
      enabled: true
      rate: 0.40               # 40% dropout
                               # Represents very strong return loss under dense fog, dust,
                               # or combined adverse effects; consistent with strong
                               # attenuation regimes discussed in atmospheric LiDAR
                               # literature (Weitkamp, 2005)

      mode: "random"

    fov_reduction:
      enabled: true
      horizontal: 0.20         # 20% horizontal FoV loss
                               # Models severe side masking / aperture obstruction

      vertical: 0.30           # 30% vertical FoV loss
                               # Models strong lower-angle loss from spray, splash,
                               # deposition, or dense environmental obstruction

    noise:
      enabled: true
      gaussian_std: 0.06       # 6 cm Gaussian range noise
                               # Represents very high range uncertainty under severe
                               # sensing degradation

      outlier_rate: 0.04       # 4% spurious-return rate
                               # Models strong scattering / reflective clutter in dense
                               # adverse-weather or contaminated scenes
                               # (Bijelic et al., 2020; Heinzler et al., 2019)

      outlier_std: 1.2         # 1.2 m outlier deviation
                               # Large displacement for highly scattered or multipath returns

    occlusion:
      enabled: true
      distance_threshold: 30.0  # 30 m effective visibility threshold
                                # Represents severe reduction of usable sensing range

      num_objects: 6
      object_size: 3.0          # 3.0 m occlusion blobs
                                # Larger masked regions for near-failure conditions

    motion_distortion:
      enabled: true
      linear_velocity: 2.0      # 2.0 m/s linear motion during scan acquisition
                                # Chosen to produce significant but still plausible
                                # scan-level warping in a stress-test setting

      angular_velocity: 0.3     # 0.3 rad/s angular motion during scan acquisition
                                # Represents aggressive but realistic yaw/turn dynamics
                                # for scan distortion evaluation

    sparse_scan:
      enabled: true
      skip_factor: 2            # Retain every 2nd scan element
                                # Structured density reduction under extreme degradation


# =============================================================================
# PROCESSING CONFIGURATION - PERFORMANCE OPTIMIZED
# =============================================================================
processing:
  target_rate: 10.0              # 10 Hz target processing rate
                                 # Matches common LiDAR operating frequencies and supports
                                 # real-time SLAM evaluation

  enable_timing: true            # Enable timing diagnostics
  enable_diagnostics: true       # Enable quality / runtime metrics

  max_processing_time: 0.015     # 15 ms target augmentation budget
                                 # Chosen from observed implementation performance to
                                 # preserve real-time operation margin


# =============================================================================
# OUTPUT CONFIGURATION - BANDWIDTH OPTIMIZED
# =============================================================================
output:
  publish_original: false        # Reduce ROS bandwidth; original input remains available
  publish_statistics: true       # Publish per-frame diagnostics and statistics
  save_diagnostics: false        # Disable persistent logging by default


# =============================================================================
# DEBUG CONFIGURATION - PRODUCTION OPTIMIZED
# =============================================================================
debug:
  verbose_logging: false         # Minimize runtime logging overhead
  publish_intermediate: false    # Avoid extra transport overhead
  save_point_clouds: false       # Disable storage-heavy debug dumps by default

  visualization:
    enabled: false               # Disable RViz visualization for performance by default
    markers: true                # Allow lightweight markers when visualization is enabled
    point_size: 2                # Balanced rendering visibility


# Global settings
enable_diagnostics: true
enable_timing: true
